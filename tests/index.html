<style>
:root{
  --bg:#F7F7F5; --bg-elev:#FFFFFF; --bg-sunken:#EFEEEA;
  --ink:#1B1B1F; --ink-soft:#5C5B66; --ink-faint:#9694A0;
  --line:#E4E2DD; --line-soft:#EDECE8;
  --accent:#5B5FEF; --accent-soft:#EEEEFD; --accent-ink:#FFFFFF;
  --good:#2F9E6E; --good-soft:#E6F6EF;
  --warn:#D08B2A; --warn-soft:#FCF1E1;
  --bad:#D64545; --bad-soft:#FCEAEA;
  --again:#D64545; --hard:#D08B2A; --goodbtn:#2F9E6E; --easy:#3F7FE0;
  --shadow: 0 1px 2px rgba(20,20,30,.04), 0 6px 20px rgba(20,20,30,.06);
  --radius:10px; --radius-sm:6px;
  --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Inter",Helvetica,Arial,sans-serif;
  --cjk: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  --mono: "SF Mono",Consolas,Monaco,monospace;
  --sidebar-w: 224px;
}
[data-theme="dark"]{
  --bg:#17171C; --bg-elev:#1F1F26; --bg-sunken:#131317;
  --ink:#EDECF2; --ink-soft:#B3B1BE; --ink-faint:#726F7E;
  --line:#2C2C35; --line-soft:#26262E;
  --accent:#7B7FFF; --accent-soft:#26263D; --accent-ink:#FFFFFF;
  --good:#3FBE8A; --good-soft:#173226;
  --warn:#E3A34C; --warn-soft:#332711;
  --bad:#F16B6B; --bad-soft:#331A1A;
  --again:#F16B6B; --hard:#E3A34C; --goodbtn:#3FBE8A; --easy:#6C9FF5;
  --shadow: 0 1px 2px rgba(0,0,0,.2), 0 8px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .2s ease,color .2s ease;}
body.font-sm{font-size:13px;} body.font-md{font-size:14.5px;} body.font-lg{font-size:16px;}
*{scrollbar-width:thin;}
button,input,select,textarea{font-family:inherit;color:inherit;}
a{color:var(--accent);}
.hidden{display:none !important;}

/* ---------- Layout ---------- */
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--bg-elev);border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:16px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;
  transition:transform .2s ease;
}
.brand{display:flex;align-items:center;gap:9px;padding:6px 8px 18px;}
.brand .mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#8B6FF0);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0;}
.brand .name{font-weight:800;font-size:16px;letter-spacing:-.01em;}
.nav-group{margin-bottom:4px;}
.navitem{
  display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;cursor:pointer;
  font-size:13.5px;font-weight:600;color:var(--ink-soft);margin-bottom:1px;user-select:none;
}
.navitem:hover{background:var(--bg-sunken);color:var(--ink);}
.navitem.active{background:var(--accent-soft);color:var(--accent);}
.navitem .ic{width:18px;text-align:center;font-size:15px;}
.navitem .cnt{margin-left:auto;font-size:11px;background:var(--bg-sunken);padding:1px 7px;border-radius:10px;color:var(--ink-faint);font-variant-numeric:tabular-nums;}
.navitem.active .cnt{background:#fff;color:var(--accent);}
[data-theme="dark"] .navitem.active .cnt{background:var(--accent);color:#fff;}
.sidebar-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;gap:6px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--bg-elev);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink-soft);}
.icon-btn:hover{background:var(--bg-sunken);}

.main{flex:1;min-width:0;padding:26px 32px 60px;max-width:1180px;}
.mobile-topbar{display:none;align-items:center;gap:12px;padding:10px 4px 18px;position:sticky;top:0;background:var(--bg);z-index:40;}
.mobile-topbar .name{font-weight:800;font-size:16px;}
@media (max-width:900px){
  .sidebar{position:fixed;left:0;z-index:60;transform:translateX(-100%);box-shadow:var(--shadow);}
  .sidebar.open{transform:translateX(0);}
  .main{padding:14px 14px 90px;}
  .mobile-topbar{display:flex;}
  .pagehead h1{font-size:19px;}
  table{font-size:12px;}
  th,td{padding:7px 6px;}
}
@media (max-width:520px){
  .stat-box .big{font-size:21px;}
  .btn{padding:10px 14px;font-size:13px;}
  .btn-row .btn{flex:1;justify-content:center;}
}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55;}
.overlay.show{display:block;}

.pagehead{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.pagehead h1{font-size:22px;font-weight:800;margin:0;letter-spacing:-.01em;}
.pagehead .sub{font-size:13px;color:var(--ink-faint);margin-top:3px;}

.screen{display:none;}
.screen.active{display:block;animation:fadein .16s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important;}}

/* ---------- Cards / boxes ---------- */
.card{background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
.pad{padding:18px;}
.grid{display:grid;gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:760px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}.grid-2{grid-template-columns:1fr;}}

.stat-box{padding:16px;}
.stat-box .big{font-size:26px;font-weight:800;letter-spacing:-.02em;}
.stat-box .lbl{font-size:12px;color:var(--ink-faint);margin-top:4px;font-weight:600;}
.stat-box .delta{font-size:11px;margin-top:6px;font-weight:700;}
.stat-box .delta.up{color:var(--good);} .stat-box .delta.down{color:var(--bad);}

/* ---------- Buttons ---------- */
.btn{font-weight:700;font-size:13.5px;padding:10px 16px;border-radius:8px;border:1px solid transparent;background:var(--accent);color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
.btn:hover{filter:brightness(1.06);}
.btn:active{transform:translateY(1px);}
.btn.secondary{background:var(--bg-elev);color:var(--ink);border-color:var(--line);}
.btn.secondary:hover{background:var(--bg-sunken);}
.btn.ghost{background:transparent;color:var(--ink-soft);border-color:transparent;}
.btn.ghost:hover{background:var(--bg-sunken);}
.btn.danger{background:var(--bad);color:#fff;}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:6px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.fab{position:fixed;bottom:22px;right:22px;z-index:30;}
@media (max-width:900px){.fab{bottom:18px;right:18px;}}

input[type=text],input[type=number],input[type=search],input[type=password],textarea,select{
  background:var(--bg-elev);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13.5px;color:var(--ink);width:100%;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);}
label.field{display:block;margin-bottom:12px;}
label.field .lbl{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
textarea{resize:vertical;min-height:70px;font-family:var(--sans);}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;}
.badge.new{background:var(--accent-soft);color:var(--accent);}
.badge.learn{background:var(--warn-soft);color:var(--warn);}
.badge.review{background:var(--good-soft);color:var(--good);}
.tag-chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg-sunken);border:1px solid var(--line);padding:2px 8px;border-radius:12px;font-size:11px;color:var(--ink-soft);}

*:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:80;font-weight:600;}
[data-theme="dark"] .toast{background:var(--accent);color:#fff;}

.empty{text-align:center;padding:56px 20px;color:var(--ink-faint);}
.empty .ic{font-size:34px;margin-bottom:10px;opacity:.5;}
.empty h3{font-size:15px;color:var(--ink-soft);margin:0 0 6px;}
.empty p{font-size:12.5px;max-width:300px;margin:0 auto;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);padding:0 10px 8px;border-bottom:1px solid var(--line);font-weight:700;}
td{padding:9px 10px;border-bottom:1px solid var(--line-soft);vertical-align:top;}
tr.row-selected{background:var(--accent-soft);}
</style>
</head>

<div class="overlay" id="mobileOverlay"></div>
<div id="pwGate" style="position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="card pad" style="width:100%;max-width:340px;text-align:center;">
    <div class="mark" style="width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#8B6FF0);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;margin:0 auto 14px;">M</div>
    <div style="font-weight:800;font-size:16px;margin-bottom:4px;">MemoCards</div>
    <div style="font-size:12.5px;color:var(--ink-faint);margin-bottom:18px;">Enter password to continue</div>
    <input type="password" id="pwGateInput" placeholder="Password" style="text-align:center;margin-bottom:10px;" autofocus>
    <div id="pwGateError" style="color:var(--bad);font-size:12px;min-height:16px;margin-bottom:8px;"></div>
    <button class="btn" id="pwGateBtn" style="width:100%;">Unlock</button>
    <div id="tgWidgetDivider" style="display:flex;align-items:center;gap:10px;margin:18px 0 14px;color:var(--ink-faint);font-size:11px;">
      <div style="flex:1;height:1px;background:var(--line);"></div>OR<div style="flex:1;height:1px;background:var(--line);"></div>
    </div>
    <div id="tgWidgetContainer" style="display:flex;justify-content:center;"></div>
    <div id="tgWidgetHint" style="font-size:10.5px;color:var(--ink-faint);margin-top:8px;"></div>
  </div>
</div>
<div class="shell" id="appShell" style="display:none;">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="mobile-topbar">
      <button class="icon-btn" id="mobileMenuBtn">☰</button>
      <span class="name">MemoCards</span>
    </div>
    <div id="screens"></div>
  </main>
</div>
<div class="toast" id="toast"></div>

// ===== IndexedDB LAYER =====
const DB_NAME = 'memocards_db';
const DB_VERSION = 1;
let db = null;

function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e)=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains('decks')){
        const s = d.createObjectStore('decks', {keyPath:'id', autoIncrement:true});
        s.createIndex('parentId','parentId',{unique:false});
      }
      if(!d.objectStoreNames.contains('cards')){
        const s = d.createObjectStore('cards', {keyPath:'id', autoIncrement:true});
        s.createIndex('deckId','deckId',{unique:false});
        s.createIndex('due','due',{unique:false});
        s.createIndex('state','state',{unique:false});
        s.createIndex('noteId','noteId',{unique:false});
      }
      if(!d.objectStoreNames.contains('reviews')){
        const s = d.createObjectStore('reviews', {keyPath:'id', autoIncrement:true});
        s.createIndex('cardId','cardId',{unique:false});
        s.createIndex('timestamp','timestamp',{unique:false});
      }
      if(!d.objectStoreNames.contains('settings')){
        d.createObjectStore('settings', {keyPath:'key'});
      }
      if(!d.objectStoreNames.contains('backups')){
        d.createObjectStore('backups', {keyPath:'id', autoIncrement:true});
      }
    };
    req.onsuccess = (e)=>{ db=e.target.result; resolve(db); };
    req.onerror = (e)=>reject(e);
  });
}

function tx(storeNames, mode='readonly'){ return db.transaction(storeNames, mode); }

function idbGetAll(store){
  return new Promise((resolve,reject)=>{
    const req = tx([store]).objectStore(store).getAll();
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function idbGet(store, key){
  return new Promise((resolve,reject)=>{
    const req = tx([store]).objectStore(store).get(key);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function idbPut(store, val){
  return new Promise((resolve,reject)=>{
    const req = tx([store],'readwrite').objectStore(store).put(val);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function idbDelete(store, key){
  return new Promise((resolve,reject)=>{
    const req = tx([store],'readwrite').objectStore(store).delete(key);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
function idbClear(store){
  return new Promise((resolve,reject)=>{
    const req = tx([store],'readwrite').objectStore(store).clear();
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
function idbByIndex(store, indexName, value){
  return new Promise((resolve,reject)=>{
    const req = tx([store]).objectStore(store).index(indexName).getAll(value);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function idbCount(store){
  return new Promise((resolve,reject)=>{
    const req = tx([store]).objectStore(store).count();
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}

let CACHE = { decks:[], cards:[], reviews:[], settings:{} };

async function loadAllFromDB(){

  CACHE.cards = await idbGetAll('cards');

  const settingsRows = await idbGetAll('settings');

}

async function getSetting(key, fallback){

}

}

// ===== Deck operations =====
async function createDeck(name, parentId=null){
  const deck = { name, parentId: parentId||null, created: Date.now(), description:'' };
  const id = await idbPut('decks', deck);
  deck.id = id; CACHE.decks.push(deck);
  return deck;
}
async function renameDeck(id, newName){
  const d = CACHE.decks.find(x=>x.id===id); if(!d) return;
  d.name = newName; await idbPut('decks', d);
}
async function deleteDeck(id){
  const childDecks = CACHE.decks.filter(d=>d.parentId===id);
  for(const c of childDecks) await deleteDeck(c.id);
  const cardsToDelete = CACHE.cards.filter(c=>c.deckId===id);
  for(const c of cardsToDelete) await deleteCard(c.id);
  await idbDelete('decks', id);
  CACHE.decks = CACHE.decks.filter(d=>d.id!==id);
}
async function duplicateDeck(id){
  const orig = CACHE.decks.find(d=>d.id===id); if(!orig) return;
  const newDeck = await createDeck(orig.name+' (copy)', orig.parentId);
  const origCards = CACHE.cards.filter(c=>c.deckId===id);
  for(const c of origCards){
    const copy = {...c}; delete copy.id;
    copy.deckId = newDeck.id; copy.due=Date.now(); copy.interval=0; copy.reps=0; copy.ease=2.5; copy.state='new'; copy.lapses=0;
    const newId = await idbPut('cards', copy); copy.id=newId; CACHE.cards.push(copy);
  }
  return newDeck;
}

// ===== SM-2 SPACED REPETITION ALGORITHM =====
// grade: 0=Again, 1=Hard, 2=Good, 3=Easy
const DAY_MS = 24*60*60*1000;

function scheduleCard(card, grade){
  const now = Date.now();
  card.modified = now;

  if(grade === 0){
    // Again: lapse, back to learning, short relearn step
    card.lapses = (card.lapses||0) + 1;
    card.reps = 0;
    card.ease = Math.max(1.3, (card.ease||2.5) - 0.20);
    card.interval = 0;
    card.state = 'learning';
    card.due = now + 10*60*1000; // 10 minutes
    return card;
  }

  card.reps = (card.reps||0) + 1;

  if(card.state === 'new' || card.state === 'learning'){
    // learning steps: 1st good -> 1 day, 2nd -> depends on grade
    if(grade === 1){ // hard while learning: short step
      card.interval = 0;
      card.due = now + 15*60*1000; // 15 min
      card.state = 'learning';
      return card;
    }
    if(grade === 2){ // good: graduate to 1 day
      card.interval = 1;
      card.state = 'review';
      card.due = now + 1*DAY_MS;
      return card;
    }
    if(grade === 3){ // easy: graduate straight to 4 days
      card.interval = 4;
      card.ease = (card.ease||2.5) + 0.15;
      card.state = 'review';
      card.due = now + 4*DAY_MS;
      return card;
    }
  }

  // state === 'review': standard SM-2-like progression
  if(grade === 1){ // hard
    card.ease = Math.max(1.3, card.ease - 0.15);
    card.interval = Math.max(1, Math.round(card.interval * 1.2));
  } else if(grade === 2){ // good
    card.interval = Math.max(1, Math.round(card.interval * card.ease));
  } else if(grade === 3){ // easy
    card.ease = card.ease + 0.15;
    card.interval = Math.max(1, Math.round(card.interval * card.ease * 1.3));
  }
  card.state = 'review';
  card.due = now + card.interval*DAY_MS;
  return card;
}

function isDue(card){ return card.due <= Date.now(); }
function isMastered(card){ return card.reps>=3 && card.interval>=21 && card.state==='review'; }
function cardStateLabel(card){
  if(card.reps===0) return 'new';
  if(isMastered(card)) return 'mastered';
  if(card.state==='learning') return 'learning';
  return 'review';
}

// ===== Cloze / Reverse note expansion =====
function extractClozeNumbers(text){
  const matches = [...text.matchAll(/\{\{c(\d+)::/g)];
  return [...new Set(matches.map(m=>parseInt(m[1])))].sort((a,b)=>a-b);
}
function renderCloze(text, activeNum, revealed){
  return text.replace(/\{\{c(\d+)::(.*?)(?:::(.*?))?\}\}/g, (m, num, answer, hint)=>{
    num = parseInt(num);
    if(num === activeNum){
      return revealed ? `<span class="cloze-answer">${answer}</span>` : `<span class="cloze-blank">[${hint||'...'}]</span>`;
    }
    return revealed ? answer : answer; // other clozes stay visible
  });
}

function computeGlobalStats(){
  const total = CACHE.cards.length;
  const dueCards = CACHE.cards.filter(c=>c.state!=='new' && isDue(c));
  const newCards = CACHE.cards.filter(c=>c.state==='new');
  const dueCount = dueCards.length + Math.min(APP.newLimit, newCards.length);
  const last30 = Date.now() - 30*DAY_MS;
  const recentReviews = CACHE.reviews.filter(r=>r.timestamp>=last30);
  const correct = recentReviews.filter(r=>r.grade>0).length;
  const retention = recentReviews.length ? Math.round(correct/recentReviews.length*100) : 0;
  return { total, dueCount, newCount:newCards.length, retention };
}
function computeStreak(){
  const days = new Set(CACHE.reviews.map(r=>new Date(r.timestamp).toDateString()));
  let streak=0; let d=new Date();
  if(!days.has(d.toDateString())){ d.setDate(d.getDate()-1); if(!days.has(d.toDateString())) return 0; }
  while(days.has(d.toDateString())){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}

// ===== DECK helpers =====
function deckStats(deckId){
  const all = deckAndDescendantIds(deckId);
  const cards = CACHE.cards.filter(c=>all.has(c.deckId));
  const due = cards.filter(c=>c.state!=='new' && isDue(c)).length;
  const neu = cards.filter(c=>c.state==='new').length;
  const learned = cards.filter(c=>isMastered(c)).length;
  return {total:cards.length, due, neu, learned};
}
function deckAndDescendantIds(deckId){
  const ids = new Set([deckId]);
  let changed=true;
  while(changed){
    changed=false;
    CACHE.decks.forEach(d=>{ if(d.parentId && ids.has(d.parentId) && !ids.has(d.id)){ ids.add(d.id); changed=true; } });
  }
  return ids;
}
function deckCardHtml(d){
  const st = deckStats(d.id);
  return `<div class="card pad deck-card" data-deck="${d.id}" style="cursor:pointer;">
    <div style="font-weight:800;font-size:14.5px;margin-bottom:8px;">${esc(d.name)}</div>

      ${st.due>0?`<span style="color:var(--accent);font-weight:700;">${st.due} ${t('decks_due')}</span>`:''}
    </div>
  </div>`;
}
function wireDeckCardEvents(container){

}

  const deck = CACHE.decks.find(d=>d.id===id);

    openModal(t('decks_rename'), `<label class="field"><input type="text" id="renameInput" value="${esc(deck.name)}"></label>`,

function openCardEditor(cardId, defaultDeckId){
  const card = cardId ? CACHE.cards.find(c=>c.id===cardId) : null;
  const type = card ? card.type : 'basic';
  const deckOpts = CACHE.decks.map(d=>`<option value="${d.id}" ${((card?card.deckId:defaultDeckId)===d.id)?'selected':''}>${esc(d.name)}</option>`).join('');
  openModal(card?t('browser_edit'):t('decks_addCard'), `
    <label class="field"><span class="lbl">${t('card_deck')}</span><select id="cardDeckSel">${deckOpts}</select></label>
    <label class="field"><span class="lbl">${t('card_type')}</span>
      <select id="cardTypeSel" ${card?'disabled':''}>
        <option value="basic">${t('card_basic')}</option>
        <option value="reverse">${t('card_reverse')}</option>
        <option value="cloze">${t('card_cloze')}</option>
        <option value="mcq">${t('card_mcq')}</option>
        <option value="chinese">${t('card_chinese')}</option>
      </select></label>
    <div id="cardTypeFields"></div>
    <label class="field"><span class="lbl">${t('card_image')}</span><input type="file" id="cardImageInput" accept="image/*"></label>
    <div id="cardImagePreview"></div>
    <label class="field"><span class="lbl">${t('card_audio')}</span><input type="file" id="cardAudioInput" accept="audio/*"></label>
    <label class="field"><span class="lbl">${t('card_tags')}</span><input type="text" id="cardTagsInput" value="${card?esc((card.tags||[]).join(', ')):''}"></label>
  `, `<button class="btn secondary" onclick="closeModal()">${t('card_cancel')}</button><button class="btn" id="saveCardBtn">${t('card_save')}</button>`);

  document.getElementById('cardTypeSel').value = type;
  renderCardTypeFields(type, card);
  document.getElementById('cardTypeSel').addEventListener('change', (e)=>renderCardTypeFields(e.target.value, null));

  let pendingImage = card && card.media ? card.media.imageData : null;
  let pendingAudio = card && card.media ? card.media.audioData : null;
  if(pendingImage) document.getElementById('cardImagePreview').innerHTML = `<img src="${pendingImage}" style="max-width:100%;max-height:120px;border-radius:6px;margin:6px 0;">`;
  document.getElementById('cardImageInput').addEventListener('change', (e)=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=(ev)=>{ pendingImage=ev.target.result; document.getElementById('cardImagePreview').innerHTML=`<img src="${pendingImage}" style="max-width:100%;max-height:120px;border-radius:6px;margin:6px 0;">`; };
    r.readAsDataURL(f);
  });
  document.getElementById('cardAudioInput').addEventListener('change', (e)=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=(ev)=>{ pendingAudio=ev.target.result; };
    r.readAsDataURL(f);
  });

  document.getElementById('saveCardBtn').addEventListener('click', async ()=>{
    const deckId = parseInt(document.getElementById('cardDeckSel').value);
    const chosenType = document.getElementById('cardTypeSel').value;
    const tags = document.getElementById('cardTagsInput').value.split(',').map(s=>s.trim()).filter(Boolean);
    const fields = collectCardTypeFields(chosenType);
    if(!fields) return; // validation failed, message already shown
    const media = { imageData: pendingImage||null, audioData: pendingAudio||null };

    if(card){
      card.deckId=deckId; card.fields=fields; card.tags=tags; card.media=media;
      await updateCard(card);
      closeModal(); showToast(t('toast_saved'));
      renderCurrentScreen();
      return;
    }

    if(chosenType==='reverse'){
      const noteId = 'n'+Date.now();
      const c1 = newCardShell(deckId,'basic',{front:fields.front, back:fields.back},{tags,media,noteId});
      const c2 = newCardShell(deckId,'basic',{front:fields.back, back:fields.front},{tags,media,noteId});
      await addCard(c1); await addCard(c2);
    } else if(chosenType==='cloze'){
      const nums = extractClozeNumbers(fields.text);
      if(nums.length===0){ showToast('Add at least one {{c1::...}} cloze'); return; }
      const noteId = 'n'+Date.now();
      for(const n of nums){
        const c = newCardShell(deckId,'cloze',{text:fields.text, clozeNum:n},{tags,media,noteId});
        await addCard(c);
      }
    } else {
      const c = newCardShell(deckId, chosenType, fields, {tags,media});
      await addCard(c);
    }
    closeModal(); showToast(t('toast_saved'));
    renderCurrentScreen(true);
  });
}
function renderCardTypeFields(type, card){
  const box = document.getElementById('cardTypeFields');
  const f = card ? card.fields : {};
  if(type==='basic' || type==='reverse'){
    box.innerHTML = `
      <label class="field"><span class="lbl">${t('card_front')}</span><textarea id="f_front">${esc(f.front||'')}</textarea></label>
      <label class="field"><span class="lbl">${t('card_back')}</span><textarea id="f_back">${esc(f.back||'')}</textarea></label>`;
  } else if(type==='cloze'){
    box.innerHTML = `<label class="field"><span class="lbl">${t('card_clozeText')}</span><textarea id="f_text" placeholder="Paris is the {{c1::capital}} of {{c2::France}}.">${esc(f.text||'')}</textarea></label>`;
  } else if(type==='mcq'){
    box.innerHTML = `
      <label class="field"><span class="lbl">${t('card_question')}</span><textarea id="f_q">${esc(f.question||'')}</textarea></label>
      <label class="field"><span class="lbl">${t('card_options')}</span><textarea id="f_opts">${esc((f.options||[]).join('\n'))}</textarea></label>
      <label class="field"><span class="lbl">${t('card_correctOption')}</span><input type="number" id="f_correct" min="1" value="${(f.correctIndex!=null?f.correctIndex+1:1)}"></label>`;
  } else if(type==='chinese'){
    box.innerHTML = `
      <label class="field"><span class="lbl">${t('card_hanzi')}</span><input type="text" id="f_hanzi" value="${esc(f.hanzi||'')}"></label>
      <label class="field"><span class="lbl">${t('card_pinyin')}</span><input type="text" id="f_pinyin" value="${esc(f.pinyin||'')}"></label>
      <label class="field"><span class="lbl">${t('card_translation')}</span><input type="text" id="f_translation" value="${esc(f.translation||'')}"></label>`;
  }
}
function collectCardTypeFields(type){
  if(type==='basic'||type==='reverse'){
    const front=document.getElementById('f_front').value.trim(), back=document.getElementById('f_back').value.trim();
    if(!front||!back){ showToast('Front and Back are required'); return null; }
    return {front, back};
  }
  if(type==='cloze'){
    const text=document.getElementById('f_text').value.trim();
    if(!text.includes('{{c')){ showToast('Use {{c1::answer}} syntax'); return null; }
    return {text};
  }
  if(type==='mcq'){
    const q=document.getElementById('f_q').value.trim();
    const opts=document.getElementById('f_opts').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const correct=parseInt(document.getElementById('f_correct').value)-1;
    if(!q||opts.length<2){ showToast('Question and at least 2 options required'); return null; }
    return {question:q, options:opts, correctIndex: Math.max(0,Math.min(correct,opts.length-1))};
  }
  if(type==='chinese'){
    const hanzi=document.getElementById('f_hanzi').value.trim();
    const pinyin=document.getElementById('f_pinyin').value.trim();
    const translation=document.getElementById('f_translation').value.trim();
    if(!hanzi||!translation){ showToast('Hanzi and Translation are required'); return null; }
    return {hanzi, pinyin, translation};
  }
  return null;
}

function buildStudyQueue(deckId){
  const ids = deckAndDescendantIds(deckId);
  let cards = CACHE.cards.filter(c=>ids.has(c.deckId));
  const due = cards.filter(c=>c.state!=='new' && isDue(c));
  const neu = cards.filter(c=>c.state==='new').slice(0, APP.newLimit);
  const learning = cards.filter(c=>c.state==='learning' && !isDue(c));
  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  const queue = shuffle(due.slice()).concat(shuffle(neu.slice())).concat(shuffle(learning.slice()));
  return queue.slice(0, APP.reviewLimit);
}

function startStudySession(deckId){
  const queue = buildStudyQueue(deckId);
  APP.studySession = { deckId, queue, pos:0, sessionCorrect:0, startTime:Date.now() };
  navigateTo('study');
}

async function commitGrade(card, grade){
  scheduleCard(card, grade);
  await updateCard(card);
  await logReview(card.id, grade);
  const s=APP.studySession; s.pos++;
  studyKeyHandler=null;
  if(s.pos>=s.queue.length){ renderSessionComplete(); }
  else { studyProgressUpdate(); renderStudyCard(); }
}

function wireReveal(card, stage){
  const reveal = ()=>{
    document.getElementById('answerBox').classList.remove('hidden');
    document.getElementById('revealBtn').classList.add('hidden');
    document.getElementById('gradeArea').classList.remove('hidden');
    stage.querySelectorAll('.cloze-answer').forEach(el=>el.style.cssText='background:var(--good-soft);color:var(--good);padding:1px 8px;border-radius:4px;font-weight:700;');
    studyKeyHandler=null;
    wireGradeButtons(stage, (g)=>commitGrade(card,g));

function renderHeatmap(container){
  const counts = {};
  CACHE.reviews.forEach(r=>{ const d=new Date(r.timestamp).toISOString().slice(0,10); counts[d]=(counts[d]||0)+1; });
  const today = new Date();
  const days = [];
  for(let i=364;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); days.push(d.toISOString().slice(0,10)); }
  const max = Math.max(1, ...Object.values(counts));
  function colorFor(n){
    if(n===0) return 'var(--bg-sunken)';
    const pct = n/max;
    if(pct<0.25) return 'var(--good-soft)';
    if(pct<0.5) return '#8FD9B6';
    if(pct<0.75) return '#4FBE8A';
    return 'var(--good)';
  }
  const weeks = [];
  for(let i=0;i<days.length;i+=7) weeks.push(days.slice(i,i+7));
  container.innerHTML = `<div style="display:flex;gap:3px;">
    ${weeks.map(week=>`<div style="display:flex;flex-direction:column;gap:3px;">
      ${week.map(d=>`<div title="${d}: ${counts[d]||0}" style="width:11px;height:11px;border-radius:2px;background:${colorFor(counts[d]||0)};"></div>`).join('')}
    </div>`).join('')}
  </div>`;
}

function cardFrontText(c){
  if(c.type==='basic') return c.fields.front;
  if(c.type==='cloze') return c.fields.text.replace(/\{\{c\d+::(.*?)(::.*?)?\}\}/g,'[$1]');
  if(c.type==='mcq') return c.fields.question;
  if(c.type==='chinese') return c.fields.hanzi;
  return '';
}
function cardBackText(c){
  if(c.type==='basic') return c.fields.back;
  if(c.type==='cloze') return '(cloze)';
  if(c.type==='mcq') return c.fields.options[c.fields.correctIndex]||'';
  if(c.type==='chinese') return c.fields.translation;
  return '';
}
function filteredBrowserCards(){
  const f=APP.browserFilter;
  let cards = CACHE.cards;
  if(f.deckId) cards = cards.filter(c=>c.deckId===f.deckId);
  if(f.search){
    const s=f.search.toLowerCase();
    cards = cards.filter(c=> (cardFrontText(c)||'').toLowerCase().includes(s) || (cardBackText(c)||'').toLowerCase().includes(s) || (c.tags||[]).join(' ').toLowerCase().includes(s));
  }
  return cards;
}

  if(pager){
    pager.innerHTML = `
      <span style="font-size:12px;color:var(--ink-faint);">${cards.length} ${t('decks_cards')} — ${f.page*PAGE_SIZE+1}-${Math.min((f.page+1)*PAGE_SIZE,cards.length)}</span>

async function handleImportFile(file){
  const msg = document.getElementById('importMsg');
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data || !Array.isArray(data.decks) || !Array.isArray(data.cards)){
      msg.innerHTML = `<span style="color:var(--bad);">${t('io_importError')}</span>`; return;
    }
    const idMapDeck = {};
    for(const d of data.decks){
      const oldId = d.id;
      const nd = {name:d.name, parentId:null, created:d.created||Date.now(), description:d.description||''};
      const newId = await idbPut('decks', nd); nd.id=newId; CACHE.decks.push(nd);
      idMapDeck[oldId]=newId;
    }
    // second pass fix parentIds
    for(const d of data.decks){
      if(d.parentId && idMapDeck[d.parentId]){
        const nd = CACHE.decks.find(x=>x.id===idMapDeck[d.id]);
        if(nd){ nd.parentId = idMapDeck[d.parentId]; await idbPut('decks', nd); }
      }
    }
    for(const c of data.cards){
      const nc = {...c}; delete nc.id;
      nc.deckId = idMapDeck[c.deckId] || CACHE.decks[0]?.id;
      const newId = await idbPut('cards', nc); nc.id=newId; CACHE.cards.push(nc);
    }
    if(Array.isArray(data.reviews)){
      for(const r of data.reviews){ const nr={...r}; delete nr.id; const nid=await idbPut('reviews', nr); nr.id=nid; CACHE.reviews.push(nr); }
    }
    msg.innerHTML = `<span style="color:var(--good);">${t('io_importSuccess')} (${data.decks.length} decks, ${data.cards.length} cards)</span>`;
    renderSidebar();
  }catch(err){
    msg.innerHTML = `<span style="color:var(--bad);">${t('io_importError')}</span>`;
  }
}

async function restoreFullData(data){
  await idbClear('decks'); await idbClear('cards'); await idbClear('reviews');
  for(const d of data.decks) await idbPut('decks', d);
  for(const c of data.cards) await idbPut('cards', c);
  for(const r of (data.reviews||[])) await idbPut('reviews', r);
  await loadAllFromDB();
}

async function sendMyDataToTelegram(){
  if(!telegramUserInfo){ showToast('Please log in with Telegram first to enable this.'); return; }
  if(!TELEGRAM_CONFIG.relayUrl){ showToast('Telegram relay not configured yet.'); return; }
  const data = buildFullExport();
  try{
    const res = await fetch(TELEGRAM_CONFIG.relayUrl + '/send-user-data', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telegramChatId: telegramUserInfo.id, filename:`memocards_backup_${Date.now()}.json`, jsonContent: JSON.stringify(data) }),
    });
    const r = await res.json();
    showToast(r.ok ? 'Sent! Check your Telegram.' : ('Failed: '+(r.error||'unknown, did you start a chat with the bot first?')));
  }catch(e){ showToast('Could not reach relay.'); }
}

function renderTelegramWidget(){
  const box = document.getElementById('tgWidgetContainer');
  const hint = document.getElementById('tgWidgetHint');
  if(!TELEGRAM_CONFIG.botUsername || !TELEGRAM_CONFIG.relayUrl){
    document.getElementById('tgWidgetDivider').style.display='none';
    hint.textContent='';
    return;
  }
  window.onTelegramAuth = async (user)=>{
    hint.textContent='Verifying...';
    try{
      const res = await fetch(TELEGRAM_CONFIG.relayUrl + '/verify-login', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(user)
      });
      const r = await res.json();
      if(!r.ok){ hint.textContent='Verification failed. Try again.'; return; }
      saveTelegramUserInfo(r.user);
      await notifyAdmin('login');
      tryUnlock(GATE_PASSWORD, true); // proceed same as normal unlock; skip duplicate notify
    }catch(e){ hint.textContent='Could not reach relay server.'; }
  };
  const s = document.createElement('script');
  s.src='https://telegram.org/js/telegram-widget.js?22';
  s.setAttribute('data-telegram-login', TELEGRAM_CONFIG.botUsername);
  s.setAttribute('data-size','large');
  s.setAttribute('data-onauth','onTelegramAuth(user)');
  s.setAttribute('data-request-access','write');
  box.appendChild(s);
}


const GATE_PASSWORD = 'kongzixueyuan';
const GATE_SESSION_KEY = 'memocards_unlocked';
function tryUnlock(pw, viaTelegram){
  if(pw === GATE_PASSWORD){
    try{ sessionStorage.setItem(GATE_SESSION_KEY, '1'); }catch(e){}
    document.getElementById('pwGate').style.display='none';
    document.getElementById('appShell').style.display='';
    if(!viaTelegram) notifyAdmin('password');
    initApp();
    return true;
  }
  document.getElementById('pwGateError').textContent = 'Incorrect password';
  document.getElementById('pwGateInput').value='';
  document.getElementById('pwGateInput').focus();
  return false;
}
function setupPasswordGate(){
  loadTelegramUserInfo();
  renderTelegramWidget();
  let alreadyUnlocked=false;
  try{ alreadyUnlocked = sessionStorage.getItem(GATE_SESSION_KEY)==='1'; }catch(e){}
  if(alreadyUnlocked){
    document.getElementById('pwGate').style.display='none';
    document.getElementById('appShell').style.display='';
    initApp();
    return;
  }
  document.getElementById('pwGateBtn').addEventListener('click', ()=>tryUnlock(document.getElementById('pwGateInput').value));
  document.getElementById('pwGateInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryUnlock(e.target.value); });
  document.getElementById('pwGateInput').focus();
}
setupPasswordGate();

// ===== INIT =====
async function initApp(){
  await openDB();
  await loadAllFromDB();

  APP.theme = await getSetting('theme','light');
  APP.fontSize = await getSetting('fontSize','md');
  APP.newLimit = await getSetting('newLimit',20);
  APP.reviewLimit = await getSetting('reviewLimit',200);
  APP.showTimer = await getSetting('showTimer',true);
  APP.autoBackup = await getSetting('autoBackup','daily');
  currentLang = await getSetting('lang', (navigator.language||'en').slice(0,2));
  if(!I18N[currentLang]) currentLang='en';

  document.documentElement.setAttribute('data-theme', APP.theme);
  document.body.className = 'font-'+APP.fontSize;

  // seed a starter deck + a couple of demo cards on very first run only
  if(CACHE.decks.length===0){
    const d = await createDeck('Welcome Deck', null);
    const c1 = newCardShell(d.id,'basic',{front:'What is spaced repetition?', back:'A learning technique that schedules reviews at increasing intervals.'});
    const c2 = newCardShell(d.id,'chinese',{hanzi:'你好', pinyin:'nǐ hǎo', translation:'hello'});
    await addCard(c1); await addCard(c2);
  }

  // auto-backup check
  const lastBackup = await getSetting('lastAutoBackup', 0);
  const now = Date.now();
  const interval = APP.autoBackup==='daily' ? DAY_MS : APP.autoBackup==='weekly' ? 7*DAY_MS : Infinity;
  if(now - lastBackup > interval){
    await createBackupSnapshot();
    await setSetting('lastAutoBackup', now);
    // prune old backups, keep latest 10
    const all = (await idbGetAll('backups')).sort((a,b)=>b.timestamp-a.timestamp);
    for(const old of all.slice(10)) await idbDelete('backups', old.id);
  }

  navigateTo('dashboard');
}
